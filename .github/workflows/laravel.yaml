# .github/workflows/laravel.yml

name: Laravel CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # Job 1 : Tests unitaires et fonctionnels
  tests:
    name: Tests PHP ${{ matrix.php-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.2']
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, pdo, pdo_mysql
          coverage: xdebug
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
      - name: Install dependencies
        env:
          COMPOSER_MEMORY_LIMIT: -1
        run: composer install --prefer-dist --no-progress --no-scripts
      - name: Setup environment
        run: |
          cp .env.example .env
          php artisan key:generate
      - name: Composer post-install scripts
        run: composer run-script post-autoload-dump
      - name: Run database migrations
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing
          DB_USERNAME: root
          DB_PASSWORD: password
        run: php artisan migrate --force
      - name: Run tests with coverage
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing
          DB_USERNAME: root
          DB_PASSWORD: password
        run: php artisan test --coverage --min=80
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.php-version == '8.2'
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # Job 2 : Qualité de code
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress
      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyse --memory-limit=512M || true  # ⚠️ Le || true empêche l'échec si erreurs
      # - name: Run PHP CS Fixer
      #   run: ./vendor/bin/php-cs-fixer fix --dry-run --diff --verbose

  # Job 3 : Build frontend
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Build assets
        run: npm run build

